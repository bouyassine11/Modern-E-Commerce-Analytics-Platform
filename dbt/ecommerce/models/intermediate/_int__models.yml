version: 2

models:
  - name: int_orders_enriched
    description: >
      Denormalized order line items enriched with customer, product, and
      payment data. Grain: one row per line item in an order.

      This is the primary intermediate model — it joins all five staging
      tables (orders, customers, order_items, products, payments) into a
      single dataset. Downstream fact and dimension models reference this
      instead of repeating join logic. Payments are rolled up per order
      with a priority-based status (completed > refunded > pending > failed)
      and the most recent payment method is carried forward.

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - order_id
            - product_id

    columns:
      - name: order_id
        description: Unique order identifier. Duplicated across line items within an order.
        tests:
          - not_null

      - name: customer_id
        description: Foreign key to stg_customers — the customer who placed the order.
        tests:
          - not_null

      - name: customer_name
        description: Derived — first_name concatenated with last_name.
        tests:
          - not_null

      - name: country
        description: Customer's country of residence.
        tests:
          - not_null

      - name: product_id
        description: Foreign key to stg_products — the product in this line item.
        tests:
          - not_null

      - name: product_name
        description: Product display name.
        tests:
          - not_null

      - name: category
        description: Product category.

      - name: quantity
        description: Units purchased in this line item.
        tests:
          - not_null

      - name: unit_price
        description: Price per unit at time of order.
        tests:
          - not_null

      - name: order_amount
        description: Total order value (order-level, duplicated across items).

      - name: payment_method
        description: >
          Payment method used. Falls back to the order-level value from stg_orders
          when no payment transaction exists.
        tests:
          - accepted_values:
              values:
                - credit_card
                - paypal
                - stripe
                - bank_transfer

      - name: payment_status
        description: >
          Rolled-up payment status per order. Priority: completed > refunded >
          pending > failed. NULL when no payment transaction is linked.
        tests:
          - accepted_values:
              values:
                - completed
                - refunded
                - pending
                - failed

      - name: order_date
        description: Timestamp of order placement.
        tests:
          - not_null
