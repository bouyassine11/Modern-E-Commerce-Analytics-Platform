version: 2

models:
  # ---------------------------------------------------------------------------
  # Dimensions
  # ---------------------------------------------------------------------------

  - name: dim_customer
    description: >
      Customer dimension with SCD Type 2 tracking for city and country changes.
      Built on the dbt snapshot `snap_customers` which detects column-level
      changes via the `check` strategy. Each customer version gets a unique
      `customer_key`. The `is_current` flag enables efficient filtering to the
      active version. Historical versions are preserved for point-in-time
      analysis.

      **SCD behavior:** When `city` or `country` changes, the snapshot closes
      the old version (sets `end_date`) and creates a new version with
      `is_current = true`. All other attributes (email, phone, etc.) reflect
      the most recent values per version.

      **Known limitation:** `effective_date` is set to the dbt snapshot
      detection time, not the source change time. For accurate historical
      fact attribution, source CDC timestamps must be provided.

    columns:
      - name: customer_key
        description: Surrogate key — stable primary key for this dimension.
        tests:
          - unique
          - not_null

      - name: customer_id
        description: Business key — unique customer identifier from source.
        tests:
          - unique
          - not_null

      - name: full_name
        description: Derived — first_name concatenated with last_name.
        tests:
          - not_null

      - name: email
        description: Customer email address.
        tests:
          - not_null

      - name: phone
        description: Normalized phone number.

      - name: address
        description: Mailing address.

      - name: city
        description: City of residence.

      - name: state
        description: State or province.

      - name: zip_code
        description: Postal code.

      - name: country
        description: Country name.

      - name: signup_date
        description: Date of account creation.
        tests:
          - not_null

      - name: customer_status
        description: Account lifecycle status.
        tests:
          - not_null

      - name: end_date
        description: >
          SCD tracking — timestamp when this version was superseded by a newer
          one. NULL indicates the current active version.

      - name: is_current
        description: TRUE for the current active version of each customer.
        tests:
          - not_null

      - name: created_at
        description: DW load timestamp.

  - name: dim_product
    description: >
      Product dimension table. Surrogate-keyed with product_key as the stable
      primary key. Includes category, pricing, and inventory attributes.
      Product dimension typically has low SCD churn; Type 1 is sufficient.

    columns:
      - name: product_key
        description: Surrogate key — stable primary key for this dimension.
        tests:
          - unique
          - not_null

      - name: product_id
        description: Business key — unique product identifier from source.
        tests:
          - unique
          - not_null

      - name: product_name
        description: Product display name.
        tests:
          - not_null

      - name: category
        description: Product category.
        tests:
          - not_null

      - name: price
        description: Current unit price.
        tests:
          - not_null

      - name: stock_quantity
        description: Current inventory count.
        tests:
          - not_null

      - name: description
        description: Long-form product description.

      - name: total_units_sold
        description: Lifetime units sold (from int_product_metrics).

      - name: gross_revenue
        description: Lifetime gross revenue.

      - name: avg_unit_price
        description: Average selling price across all transactions.

      - name: last_order_date
        description: Date of most recent sale.

      - name: days_since_last_sale
        description: Days since the most recent sale.

      - name: is_active
        description: Flag indicating whether the product has been sold recently.

      - name: created_at
        description: Source record creation timestamp.

      - name: updated_at
        description: Source record update timestamp.

  - name: dim_date
    description: >
      Static date dimension covering 2020-01-01 to 2030-12-31. Populated via a
      dbt date spine macro — no ETL dependency. Every column is pre-computed
      for analytical convenience: day, week, month, quarter, year, fiscal
      periods, season, and weekend/holiday flags. The date_key uses the
      YYYYMMDD integer format for efficient joins.

    columns:
      - name: date_key
        description: Surrogate key — integer in YYYYMMDD format.
        tests:
          - unique
          - not_null

      - name: full_date
        description: Calendar date.
        tests:
          - unique
          - not_null

      - name: day
        description: Day of month (1–31).

      - name: month
        description: Month number (1–12).

      - name: month_name
        description: Month name (January–December).

      - name: month_short_name
        description: Abbreviated month name (Jan–Dec).

      - name: quarter
        description: Calendar quarter (1–4).

      - name: year
        description: Four-digit year.

      - name: day_of_week
        description: Day of week (0=Sunday, 6=Saturday).

      - name: day_name
        description: Day name (Sunday–Saturday).

      - name: day_of_year
        description: Ordinal day of year (1–366).

      - name: week_of_year
        description: ISO week number (1–53).

      - name: is_weekend
        description: TRUE for Saturday and Sunday.

      - name: is_holiday
        description: Placeholder flag for holiday calendar (currently FALSE).

      - name: fiscal_quarter
        description: Fiscal quarter (configurable — default aligns with calendar).

      - name: fiscal_year
        description: Fiscal year (configurable).

      - name: month_end_date
        description: Last calendar day of the month.

      - name: season
        description: Meteorological season (Spring, Summer, Fall, Winter).

  # ---------------------------------------------------------------------------
  # Fact Tables
  # ---------------------------------------------------------------------------

  - name: fact_sales
    description: >
      Atomic transaction fact table — grain is one row per order line item.
      Joins int_orders_enriched with dim_customer, dim_product, dim_date.
      This is the core fact table powering revenue, product, and customer
      analytics. Designed for incremental loading: on each run, only orders
      placed since the last load are processed.

      **Incremental logic:** The `is_incremental()` block filters
      `int_orders_enriched` to rows where `order_date > (select max(order_date)
      from fact_sales)`. The `unique_key` is `order_item_id` for merge-based
      dedup. `on_schema_change = 'append_new_columns'` handles schema drift.

      **SCD join:** The customer surrogate key joins on `dim_customer` where
      `is_current = true`. Historical version attribution requires point-in-time
      date-range matching when source change timestamps are available.

    columns:
      - name: sales_key
        description: >
          Surrogate key — BIGINT derived from MD5 hash of order_id and
          order_item_id (first 8 hex chars → 32-bit int). Deterministic
          and stable across incremental runs.
        tests:
          - unique
          - not_null

      - name: order_id
        description: Degenerate dimension — order identifier.

      - name: order_item_id
        description: >
          Degenerate dimension — line-item identifier. Used as the
          `unique_key` for incremental merge dedup.
        tests:
          - unique
          - not_null

      - name: customer_key
        description: Foreign key to dim_customer.
        tests:
          - not_null
          - relationships:
              to: ref('dim_customer')
              field: customer_key

      - name: product_key
        description: Foreign key to dim_product.
        tests:
          - not_null
          - relationships:
              to: ref('dim_product')
              field: product_key

      - name: date_key
        description: Foreign key to dim_date (order date).
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key

      - name: quantity
        description: Units purchased in this line item.
        tests:
          - not_null

      - name: unit_price
        description: Price per unit recorded at time of purchase.
        tests:
          - not_null

      - name: discount_amount
        description: Discount applied to this line item.

      - name: total_amount
        description: Net line total (quantity × unit_price − discount).
        tests:
          - not_null

      - name: payment_status
        description: Rolled-up payment status — 'paid', 'pending', 'failed', 'refunded'.
        tests:
          - not_null
          - accepted_values:
              values:
                - paid
                - pending
                - failed
                - refunded

      - name: order_status
        description: Order lifecycle status at time of DW load.
        tests:
          - not_null
          - accepted_values:
              values:
                - pending
                - processing
                - shipped
                - delivered
                - cancelled
                - refunded

      - name: created_at
        description: DW load timestamp.

      - name: etl_batch_id
        description: ETL run identifier for lineage and debugging.

  # ---------------------------------------------------------------------------
  # Report / Mart Tables
  # ---------------------------------------------------------------------------

  - name: rpt_daily_revenue
    description: >
      Daily revenue summary — one row per calendar day with revenue, orders,
      items, customers, AOV, running totals, and weekend flag.

    columns:
      - name: report_date
        description: Calendar date.
        tests:
          - unique
          - not_null

      - name: day_of_week
        description: Day name (e.g. Monday).

      - name: is_weekend
        description: True if Saturday or Sunday.

      - name: total_orders
        description: Distinct orders placed.

      - name: total_items
        description: Units sold (line items).

      - name: total_revenue
        description: Gross revenue (paid + pending).

      - name: total_customers
        description: Distinct customers with orders.

      - name: average_order_value
        description: total_revenue / total_orders.

      - name: running_total_revenue
        description: Cumulative revenue up to this date.

      - name: running_total_orders
        description: Cumulative orders up to this date.

  - name: rpt_monthly_revenue
    description: >
      Monthly revenue summary — one row per month with MoM growth rate.
      Used for executive dashboards and trend analysis.

    columns:
      - name: year
        description: Calendar year.
        tests:
          - not_null

      - name: month
        description: Month number (1-12).
        tests:
          - not_null

      - name: month_name
        description: Month name (e.g. January).

      - name: quarter
        description: Calendar quarter.

      - name: total_orders
        description: Distinct orders placed.

      - name: total_items
        description: Units sold.

      - name: total_revenue
        description: Gross revenue.

      - name: total_customers
        description: Distinct customers.

      - name: average_order_value
        description: total_revenue / total_orders.

      - name: prev_month_revenue
        description: Revenue from prior month (for growth calculation).

      - name: revenue_growth_pct
        description: Month-over-month revenue growth percentage.

  - name: rpt_customer_lifetime_value
    description: >
      Customer lifetime value — one row per customer with RFM segmentation.
      Assigns segments (Champions, At Risk, Lost, etc.) based on recency,
      frequency, and monetary quintile scores.

    columns:
      - name: customer_key
        description: Surrogate key to dim_customer.
        tests:
          - unique
          - not_null

      - name: customer_id
        description: Business key.

      - name: full_name
        description: Customer display name.

      - name: country
        description: Customer country.

      - name: signup_date
        description: Account creation date.

      - name: first_order_date
        description: Date of first purchase.

      - name: last_order_date
        description: Date of most recent purchase.

      - name: total_orders
        description: Lifetime distinct order count.

      - name: total_items
        description: Lifetime units purchased.

      - name: total_revenue
        description: Lifetime gross revenue.

      - name: avg_order_value
        description: total_revenue / total_orders.

      - name: customer_tenure_days
        description: Days since signup.

      - name: customer_lifetime_days
        description: Days between first and last order (0 if single order).

      - name: days_since_last_order
        description: Recency in days.

      - name: recency_score
        description: Quintile (1-5) for recency (5 = most recent).

      - name: frequency_score
        description: Quintile (1-5) for frequency (5 = most frequent).

      - name: revenue_score
        description: Quintile (1-5) for monetary value (5 = highest).

      - name: rfm_score
        description: Average of R, F, M scores.

      - name: customer_segment
        description: RFM segment label (Champions, Loyal, At Risk, Lost, etc.).

  - name: rpt_top_products
    description: >
      Product performance ranking — one row per product with sales, price
      ratios, ordinal ranks, and category revenue share.

    columns:
      - name: product_key
        description: Surrogate key to dim_product.
        tests:
          - unique
          - not_null

      - name: product_id
        description: Business key.

      - name: product_name
        description: Product display name.

      - name: category
        description: Product category.

      - name: current_price
        description: Latest listed price.

      - name: avg_unit_price
        description: Average selling price.

      - name: price_vs_avg_ratio
        description: current_price / avg_unit_price.

      - name: total_units_sold
        description: Lifetime units sold.

      - name: gross_revenue
        description: Lifetime gross revenue.

      - name: order_count
        description: Distinct orders containing this product.

      - name: customer_count
        description: Distinct customers who purchased.

      - name: last_order_date
        description: Most recent sale date.

      - name: days_since_last_sale
        description: Recency of last sale.

      - name: revenue_rank
        description: Overall revenue rank (1 = top).

      - name: category_rank
        description: Revenue rank within category.

      - name: category_revenue_pct
        description: Product revenue as share of its category.

  - name: rpt_top_categories
    description: >
      Category performance — one row per product category with revenue,
      order count, active products, and revenue share vs total.

    columns:
      - name: category
        description: Product category name.
        tests:
          - unique
          - not_null

      - name: total_orders
        description: Distinct orders in category.

      - name: total_customers
        description: Distinct customers who purchased.

      - name: total_units_sold
        description: Total units sold.

      - name: gross_revenue
        description: Total category revenue.

      - name: revenue_per_order
        description: Average revenue per order.

      - name: avg_unit_price
        description: Average selling price across all items.

      - name: active_products
        description: Distinct products with sales.

      - name: first_sale_date
        description: Earliest sale in category.

      - name: last_sale_date
        description: Most recent sale in category.

      - name: revenue_rank
        description: Rank by revenue (1 = top category).

      - name: total_revenue_all
        description: Grand total revenue across all categories.

      - name: revenue_share_pct
        description: Category revenue as percentage of grand total.

  - name: rpt_country_revenue
    description: >
      Revenue by customer country — one row per country with order counts,
      customer counts, revenue per customer, and market share.

    columns:
      - name: country
        description: Customer country.
        tests:
          - unique
          - not_null

      - name: total_orders
        description: Distinct orders.

      - name: total_customers
        description: Distinct customers.

      - name: total_items
        description: Units sold.

      - name: total_revenue
        description: Gross revenue.

      - name: revenue_per_order
        description: Average revenue per order.

      - name: revenue_per_customer
        description: Average revenue per customer (ARPU).

      - name: first_order_date
        description: Earliest order in country.

      - name: last_order_date
        description: Most recent order in country.

      - name: revenue_rank
        description: Rank by revenue.

      - name: grand_total_revenue
        description: Revenue across all countries.

      - name: revenue_share_pct
        description: Country revenue as percentage of total.

  - name: rpt_repeat_customers
    description: >
      Repeat purchase analysis — cohort-based and monthly new vs. repeat
      customer counts. Tracks repeat purchase rate by first-order cohort month
      and monthly new/repeat customer composition.

    columns:
      - name: cohort_month
        description: Month of first purchase (cohort).

      - name: cohort_size
        description: Customers who made first purchase this month.

      - name: cohort_repeat_customers
        description: Customers with 2+ orders in the cohort.

      - name: repeat_purchase_rate_pct
        description: Repeat customers as percentage of cohort size.

      - name: report_month
        description: Calendar month for the new vs. repeat view.

      - name: monthly_new_customers
        description: Customers placing their first order this month.

      - name: monthly_repeat_customers
        description: Customers placing 2nd+ order this month.

      - name: monthly_repeat_rate_pct
        description: Repeat customers as percentage of total ordering this month.

  - name: rpt_payment_analysis
    description: >
      Payment status breakdown — one row per payment status with revenue,
      order share, and customer metrics. Enables payment success rate
      monitoring and failed payment financial impact analysis.

    columns:
      - name: payment_status
        description: Payment status (paid, pending, failed, refunded).
        tests:
          - unique
          - not_null

      - name: total_orders
        description: Distinct orders with this status.

      - name: total_items
        description: Line items with this status.

      - name: total_revenue
        description: Gross revenue (negative for refunds).

      - name: total_customers
        description: Distinct customers affected.

      - name: revenue_per_order
        description: Average revenue per order.

      - name: revenue_per_customer
        description: Average revenue per customer.

      - name: revenue_share_pct
        description: Status revenue as percentage of all statuses.

      - name: order_share_pct
        description: Status order count as percentage of all statuses.

      - name: first_order_date
        description: Earliest order with this status.

      - name: last_order_date
        description: Most recent order with this status.
